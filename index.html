    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Control · Senac IoT</title>

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { background: #080c14; }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0d1220; }
      ::-webkit-scrollbar-thumb { background: #1a2540; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #2a3a5a; }
      button { font-family: 'IBM Plex Mono', monospace; }
      input { font-family: 'IBM Plex Mono', monospace; }
      input::placeholder { color: #2d3d55; }
    </style>
  </head>
